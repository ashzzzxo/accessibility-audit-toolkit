<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixed Keyboard Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    button {
      padding: 0.75rem 1rem;
      margin-top: 1rem;
    }
    button:focus {
      outline: 3px solid #005fcc;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <h1>Fixed Keyboard Example</h1>
  <p>This page uses a proper keyboard-accessible button.</p>

  <button id="detailsBtn" type="button" onclick="showMessage()">
    Open Details
  </button>

  <p id="status" aria-live="polite"></p>

  <script>
    function showMessage() {
      document.getElementById('status').textContent = 'Details opened successfully.';
    }
  </script>
</body>
</html>
