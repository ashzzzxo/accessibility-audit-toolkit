<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broken Form Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    input, button { display: block; margin: 1rem 0; padding: 0.5rem; }
  </style>
</head>
<body>
  <h1>Broken Form Example</h1>
  <p>This form intentionally has accessibility issues.</p>

  <form>
    <input type="text" placeholder="Enter your name" />
    <input type="email" placeholder="Enter your email" />
    <button type="submit">Submit</button>
  </form>
</body>
</html>
