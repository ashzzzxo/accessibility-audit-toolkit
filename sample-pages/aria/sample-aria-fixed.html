<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixed ARIA Roles Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .box { padding: 1rem; border: 1px solid #ccc; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Fixed ARIA Roles Example</h1>
  <p>This page uses a valid ARIA role.</p>

  <div class="box" role="region" aria-label="Settings Panel">
    Settings Panel
  </div>
</body>
</html>
