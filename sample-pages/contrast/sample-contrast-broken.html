<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broken Color Contrast Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #ffffff; }
    .low-contrast {
      color: #cfcfcf;
      background: #ffffff;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Broken Color Contrast Example</h1>
  <p class="low-contrast">This text has insufficient contrast against the background.</p>
</body>
</html>
